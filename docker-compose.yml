
version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:4.0
    container_name: blog-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: blogapp
    volumes:
      - mongodb_data:/data/db
    networks:
      - blog-network
    restart: unless-stopped

  # Node.js Application Service
  app:
    build: .
    container_name: blog-app
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/blogapp
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - blog-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  blog-network:
    driver: bridge
